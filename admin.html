<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
        <nav>
            <ul>
                <li><a href="#orders">Order Management</a></li>
                <li><a href="#statistics">Statistics</a></li>
                <li><a href="#search">Search/Filter</a></li>
                <li><a href="#logout">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="orders">
            <h2>Order Management</h2>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Status</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Order rows will be dynamically inserted here -->
                </tbody>
            </table>
        </section>
        <section id="statistics">
            <h2>Statistics</h2>
            <p>Displaying various metrics and statistics about orders.</p>
            <!-- Statistics will be dynamically generated here -->
        </section>
        <section id="search">
            <h2>Search/Filter Orders</h2>
            <input type="text" placeholder="Search by Order ID or Customer Name" />
            <button>Search</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Admin Panel</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
